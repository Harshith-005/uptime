name: UptimeGuard Monitor

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Run uptime checks
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
          -X POST ${{ secrets.APP_URL }}/api/cron/monitor \
          -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
          -H "Content-Type: application/json"
      - name: Log completion
        run: echo "Monitor run completed at $(date)"
